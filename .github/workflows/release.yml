name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Require release identity configuration
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "RELEASE_PLEASE_TOKEN is required so release PR commits are attributed to the maintainer, not github-actions[bot]."
            exit 1
          fi
      - id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Validate published release notes
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          body=""
          for attempt in 1 2 3 4 5; do
            body="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json body --jq '.body // ""' 2>/dev/null || true)"
            if [[ "$body" =~ [^[:space:]] ]]; then
              break
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep "$attempt"
            fi
          done
          if [[ ! "$body" =~ [^[:space:]] ]]; then
            echo "Release $RELEASE_TAG has a blank body."
            echo "Release Please could not parse release notes for the tag."
            exit 1
          fi
