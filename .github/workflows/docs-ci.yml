name: Documentation Quality Gates

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-docs:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.13'

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.28'
          enable-cache: true
          cache-suffix: docs-py312

      - name: Check internal links
        run: uv run python scripts/check_links.py

      - name: Verify structural parity (Docs vs Src)
        run: uv run python scripts/verify_structural_parity.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Lint markdown files
        run: npx --yes markdownlint-cli@0.47.0 --disable MD013 MD033 MD041 -- 'docs/**/*.md'
