version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-security-hf-runtime:
        applies-to: "security-updates"
        patterns:
          - "transformers"
          - "huggingface-hub"
          - "sentence-transformers"
          - "tokenizers"
          - "accelerate"
          - "torch"
          - "pytorch"
          - "numpy"
          - "scipy"
          - "pydantic*"
      python-security-rag:
        applies-to: "security-updates"
        patterns:
          - "langchain*"
          - "langgraph*"
          - "llama-index*"
          - "qdrant-client"
          - "duckdb"
          - "numpy"
          - "scipy"
          - "pydantic*"
      python-security-app:
        applies-to: "security-updates"
        patterns:
          - "streamlit"
          - "pillow"
          - "requests"
          - "urllib3"
          - "numpy"
          - "scipy"
          - "pydantic*"
          - "rapidfuzz"
          - "ollama"
      python-runtime-hf:
        applies-to: "version-updates"
        patterns:
          - "transformers"
          - "huggingface-hub"
          - "sentence-transformers"
          - "tokenizers"
          - "accelerate"
          - "torch"
          - "pytorch"
      python-runtime-rag:
        applies-to: "version-updates"
        patterns:
          - "langchain*"
          - "langgraph*"
          - "llama-index*"
          - "qdrant-client"
          - "duckdb"
      python-runtime-app:
        applies-to: "version-updates"
        patterns:
          - "streamlit"
          - "pillow"
          - "numpy"
          - "scipy"
          - "pydantic*"
          - "rapidfuzz"
          - "ollama"
